<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');

    :root {
        --navy-dark: #0f172a;
        --amber-gold: #fbbf24;
    }

    .hero-bg {
        background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.9)),
            url('https://images.unsplash.com/photo-1494412519320-aa613dfb7738?q=80&w=2070&auto=format&fit=crop');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        position: relative;
        overflow: hidden;
    }

    .logo-container {
        position: relative;
        display: inline-block;
    }

    .logo-container::after {
        content: '';
        position: absolute;
        top: -5px;
        left: -5px;
        right: -5px;
        bottom: -5px;
        border-radius: 50%;
        border: 2px dashed var(--amber-gold);
        opacity: 0.3;
        animation: rotate 20s linear infinite;
    }

    @keyframes rotate {
        from {
            transform: rotate(0deg);
        }

        to {
            transform: rotate(360deg);
        }
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .animate-fade-in {
        animation: fadeInUp 0.6s ease forwards;
    }
</style>

<header class="hero-bg text-white pt-16 pb-32 px-4 relative">
    <div class="max-w-5xl mx-auto relative z-10 animate-fade-in text-center">
        <div class="mb-8 flex justify-center">
            <div class="logo-container bg-white p-1 rounded-full shadow-2xl">
                <img src="https://lh3.googleusercontent.com/a/ACg8ocKU2XQgKeyYCOFYS24vmORjjsDgpdnofR2Lq_SzC2MHXPLZJC_I=s260-c-no"
                    alt="Mostafa Hakim Logo" class="h-20 w-20 md:h-28 md:w-28 rounded-full border-4 border-white">
            </div>
        </div>
        <h1 class="text-4xl md:text-6xl font-black tracking-tight mb-2 uppercase">Mostafa Hakim</h1>
        <h2 class="text-amber-400 font-bold tracking-[0.15em] md:tracking-[0.3em] uppercase text-lg md:text-2xl mb-8">
            Shipping Lines Limited
        </h2>
        <div class="flex flex-col items-center justify-center space-y-2 text-slate-300">
            <div
                class="flex items-center space-x-2 text-xs md:text-base bg-black/20 backdrop-blur-sm py-2 px-6 rounded-full border border-white/10">
                <i class="fas fa-map-marker-alt text-amber-500"></i>
                <address class="not-italic font-light">218, D.T. Road, Dewanhat, Chattogram-4100, Bangladesh.</address>
            </div>
        </div>
    </div>
</header>
