<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ship Tonnage Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            padding: 40px 10px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
        }
        .company-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e5e7eb;
        }
        .company-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            background: #eee; /* placeholder background if image fails */
            border-radius: 4px;
        }
        .company-info {
            text-align: left;
        }
        .company-name {
            font-weight: 800;
            font-size: 18px;
            color: #1e3a8a;
            margin: 0;
            line-height: 1.2;
        }
        .company-address {
            font-size: 13px;
            color: #6b7280;
            margin-top: 5px;
            line-height: 1.4;
        }
        h2 {
            color: #1e3a8a;
            text-align: center;
            margin-bottom: 25px;
            font-size: 22px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .reset-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        .output-box {
            background: #f9fafb;
            padding: 20px;
            border-radius: 8px;
            margin-top: 25px;
            border: 1px solid #e5e7eb;
        }
        .output-item {
            margin-bottom: 15px;
            border-bottom: 1px solid #f3f4f6;
            padding-bottom: 8px;
        }
        .label-text {
            font-weight: bold;
            color: #1d4ed8;
            font-size: 11px;
            text-transform: uppercase;
        }
        .result-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
        }
        .result-text {
            color: #111827;
            font-size: 18px;
            font-weight: 700;
        }
        .words-text {
            color: #d97706;
            font-weight: 600;
            font-size: 15px;
            margin-top: 8px;
            display: block;
            line-height: 1.6;
            background: #fffbeb;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #fef3c7;
        }
        .copy-btn {
            background: #e5e7eb;
            color: #4b5563;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            font-weight: bold;
        }
        .copy-btn.copied {
            background: #10b981;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="company-header">
            <img src="https://lh3.googleusercontent.com/a/ACg8ocKU2XQgKeyYCOFYS24vmORjjsDgpdnofR2Lq_SzC2MHXPLZJC_I=s260-c-no" alt="LOGO" class="company-logo">
            <div class="company-info">
                <p class="company-name">MOSTAFA HAKIM SHIPPING LINES LTD.</p>
                <p class="company-address">
                    218, D.T. Road, Dewanhat,<br>
                    Chattogram-4100, Bangladesh.
                </p>
            </div>
        </div>

        <h2>Vessel Value Calculator</h2>

        <div class="input-group">
            <label>MT (Metric Tons):</label>
            <input type="text" id="mtInput" placeholder="Enter MT" onkeyup="calculate()">
        </div>

        <div class="input-group">
            <label>Price Per LT:</label>
            <input type="text" id="rateInput" value="430" onkeyup="calculate()">
        </div>

        <div class="button-group">
            <button class="reset-btn" onclick="resetForm()">Reset Values</button>
        </div>

        <div class="output-box">
            <div class="output-item">
                <span class="label-text">LT (MT ÷ 1.016)</span>
                <div class="result-wrapper">
                    <span id="ltResult" class="result-text">0.00</span>
                    <button class="copy-btn" onclick="copyValue('ltResult', this)">COPY</button>
                </div>
            </div>

            <div class="output-item">
                <span class="label-text">Final Value (Figures)</span>
                <div class="result-wrapper">
                    <span id="finalFigures" class="result-text">0.00</span>
                    <button class="copy-btn" onclick="copyValue('finalFigures', this)">COPY</button>
                </div>
            </div>

            <div class="output-item">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span class="label-text">Final Value (In Words)</span>
                    <button class="copy-btn" onclick="copyValue('finalWords', this)">COPY ALL WORDS</button>
                </div>
                <span id="finalWords" class="words-text">Please enter values...</span>
            </div>
        </div>
    </div>

    <script>
        // Updated Copy Function with Fallback
        function copyValue(elementId, btn) {
            const text = document.getElementById(elementId).innerText;
            if (text === "0.00" || text === "Please enter values...") return;

            // Attempt modern clipboard API
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => {
                    showSuccess(btn);
                });
            } else {
                // Fallback for non-https or older browsers
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showSuccess(btn);
                } catch (err) {
                    console.error('Unable to copy', err);
                }
                document.body.removeChild(textArea);
            }
        }

        function showSuccess(btn) {
            const originalText = btn.innerText;
            btn.innerText = "COPIED!";
            btn.classList.add('copied');
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove('copied');
            }, 1500);
        }

        function numberToWords(num) {
            if (num === 0 || isNaN(num)) return 'Zero';
            const ones = ['', 'One', 'Two', 'Three', 'Four', 'Five', 'Six', 'Seven', 'Eight', 'Nine', 'Ten', 'Eleven', 'Twelve', 'Thirteen', 'Fourteen', 'Fifteen', 'Sixteen', 'Seventeen', 'Eighteen', 'Nineteen'];
            const tens = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];

            function convert(n) {
                let res = "";
                if (n >= 100) { res += ones[Math.floor(n / 100)] + " Hundred "; n %= 100; }
                if (n >= 20) { res += tens[Math.floor(n / 10)] + " "; n %= 10; }
                if (n > 0) { res += ones[n] + " "; }
                return res.trim();
            }

            let mainNumber = Math.floor(num);
            let decimalPart = Math.round((num - mainNumber) * 100);
            let str = "United State Dollar ";

            if (mainNumber >= 1000000) {
                str += convert(Math.floor(mainNumber / 1000000)) + " Million ";
                mainNumber %= 1000000;
            }
            if (mainNumber >= 1000) {
                str += convert(Math.floor(mainNumber / 1000)) + " Thousand ";
                mainNumber %= 1000;
            }
            str += convert(mainNumber);
            if (decimalPart > 0) { str += " & Cent " + convert(decimalPart); } 
            else { str += " & Cent Zero"; }
            return str.trim() + " Only";
        }

        function calculate() {
            let mtValue = document.getElementById('mtInput').value.replace(/,/g, '');
            let rateValue = document.getElementById('rateInput').value.replace(/,/g, '');
            const mt = parseFloat(mtValue);
            const rate = parseFloat(rateValue);

            if (!isNaN(mt) && !isNaN(rate)) {
                let lt = Math.floor((mt / 1.016) * 100) / 100;
                document.getElementById('ltResult').innerText = lt.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                let total = Math.round((lt * rate) * 100) / 100;
                document.getElementById('finalFigures').innerText = total.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                document.getElementById('finalWords').innerText = numberToWords(total);
            } else {
                document.getElementById('ltResult').innerText = "0.00";
                document.getElementById('finalFigures').innerText = "0.00";
                document.getElementById('finalWords').innerText = "Please enter values...";
            }
        }

        function resetForm() {
            document.getElementById('mtInput').value = "";
            document.getElementById('rateInput').value = "430";
            document.getElementById('ltResult').innerText = "0.00";
            document.getElementById('finalFigures').innerText = "0.00";
            document.getElementById('finalWords').innerText = "Please enter values...";
        }
    </script>
</body>
</html>
